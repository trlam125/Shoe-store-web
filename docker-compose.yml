services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lshoe_store
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - lshoe_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lshoe_store"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lshoe_postgres_data:
