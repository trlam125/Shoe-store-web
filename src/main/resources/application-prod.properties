# Production intentionally has no database credential defaults.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.thymeleaf.cache=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:true}
ai.service.autostart=${AI_SERVICE_AUTOSTART:false}

app.environment=production
app.password-reset.log-link=false
app.email-verification.log-code=false

# Never expose production automatically unless explicitly overridden.
ngrok.tunnel.autostart=${NGROK_TUNNEL_AUTOSTART:false}
