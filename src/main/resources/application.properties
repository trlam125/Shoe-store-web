spring.application.name=LSHOE Store
spring.config.import=optional:file:./Chatbot/.env[.properties]
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/lshoe_store}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:120505}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.thymeleaf.cache=false
server.port=8081
ai.service.url=${AI_SERVICE_URL:http://localhost:8001}
ai.service.autostart=${AI_SERVICE_AUTOSTART:true}
ai.service.autostart.timeout-seconds=${AI_SERVICE_AUTOSTART_TIMEOUT_SECONDS:60}
ai.service.image-timeout-ms=${AI_IMAGE_TIMEOUT_MS:120000}
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
chatbot.api-url=${CHATBOT_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
chatbot.api-key=${NVIDIA_API_KEY:}
chatbot.model=${CHATBOT_MODEL:openai/gpt-oss-120b}
chatbot.timeout-ms=${CHATBOT_TIMEOUT_MS:30000}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
app.password-reset.expiry-minutes=${PASSWORD_RESET_EXPIRY_MINUTES:30}
app.password-reset.log-link=${PASSWORD_RESET_LOG_LINK:true}
