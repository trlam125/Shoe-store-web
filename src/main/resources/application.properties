spring.application.name=LSHOE Store
spring.config.import=optional:file:./.env[.properties],optional:file:./Chatbot/.env[.properties]

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/lshoe_store}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.thymeleaf.cache=false

server.port=${SERVER_PORT:8081}
server.servlet.session.timeout=${SESSION_TIMEOUT:12h}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=${SESSION_COOKIE_SECURE:false}
server.servlet.session.cookie.same-site=lax
server.forward-headers-strategy=framework

ai.service.url=${AI_SERVICE_URL:http://127.0.0.1:8001}
ai.service.api-key=${AI_INTERNAL_API_KEY:}
ai.service.autostart=${AI_SERVICE_AUTOSTART:true}
ai.service.autostart.timeout-seconds=${AI_SERVICE_AUTOSTART_TIMEOUT_SECONDS:60}
ai.service.image-timeout-ms=${AI_IMAGE_TIMEOUT_MS:120000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

chatbot.api-url=${CHATBOT_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
chatbot.api-key=${NVIDIA_API_KEY:}
chatbot.model=${CHATBOT_MODEL:openai/gpt-oss-120b}
chatbot.timeout-ms=${CHATBOT_TIMEOUT_MS:30000}
chatbot.max-tokens=${CHATBOT_MAX_TOKENS:4096}
chatbot.empty-response-retries=${CHATBOT_EMPTY_RESPONSE_RETRIES:1}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}

app.environment=${APP_ENV:production}
app.public-base-url=${APP_PUBLIC_BASE_URL:}
app.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.seed-demo-data=${SEED_DEMO_DATA:false}
app.password-reset.expiry-minutes=${PASSWORD_RESET_EXPIRY_MINUTES:30}
app.password-reset.log-link=${PASSWORD_RESET_LOG_LINK:false}
app.rate-limit.chat-per-minute=${CHAT_RATE_LIMIT_PER_MINUTE:20}
app.rate-limit.image-per-minute=${IMAGE_RATE_LIMIT_PER_MINUTE:5}
app.rate-limit.password-reset-per-15-minutes=${PASSWORD_RESET_RATE_LIMIT_PER_15_MINUTES:3}

# Chá»‰ Ä‘á»Ťc CF-Connecting-IP/X-Forwarded-For khi request Ä‘áşżn tá»« proxy ná»™i bá»™/localhost.
app.trust-proxy-headers=${TRUST_PROXY_HEADERS:true}

chatbot.catalog-max-characters=${CHATBOT_CATALOG_MAX_CHARACTERS:40000}
