spring.application.name=LSHOE Store
spring.datasource.url=jdbc:mysql://localhost:3306/lshoe_store?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=${DB_USERNAME:root}
# Fix #6: đọc password từ biến môi trường DB_PASSWORD thay vì hardcode
# Đặt biến môi trường: set DB_PASSWORD=your_password (Windows) hoặc export DB_PASSWORD=... (Linux/Mac)
spring.datasource.password=${DB_PASSWORD:120505}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.thymeleaf.cache=false
server.port=8081
