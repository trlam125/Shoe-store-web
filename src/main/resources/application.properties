spring.application.name=LSHOE Store
# Local development is the default. Set SPRING_PROFILES_ACTIVE=prod for deployment.
spring.profiles.default=dev
spring.config.import=optional:file:./.env[.properties]

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-migration-naming=true
spring.flyway.clean-disabled=true
# Migration history was squashed into a single V1 for newly reset databases.
# Do not edit V1 again after deploying or sharing a database created from it.

server.port=${SERVER_PORT:8081}
server.servlet.session.timeout=${SESSION_TIMEOUT:12h}
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.forward-headers-strategy=framework

# IntelliJ starts Spring Boot. Spring then prepares the root .venv and starts only
# the FastAPI AI service. The customer chatbot UI is embedded in the website and
# is handled directly by Spring Boot, so no Streamlit process is required.
ai.service.url=${AI_SERVICE_URL:http://127.0.0.1:8001}
ai.service.api-key=${AI_INTERNAL_API_KEY:}
ai.service.autostart=${AI_SERVICE_AUTOSTART:true}
ai.service.setup-venv=${AI_SERVICE_SETUP_VENV:true}
ai.service.project-root=${LSHOE_PROJECT_ROOT:}
ai.service.autostart.timeout-seconds=${AI_SERVICE_AUTOSTART_TIMEOUT_SECONDS:60}
ai.service.image-timeout-ms=${AI_IMAGE_TIMEOUT_MS:120000}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
app.product-image.upload-dir=${PRODUCT_IMAGE_UPLOAD_DIR:uploads/products}

# Embedded website chatbot configuration.
chatbot.api-url=${CHATBOT_API_URL:https://integrate.api.nvidia.com/v1/chat/completions}
chatbot.api-key=${NVIDIA_API_KEY:}
chatbot.model=${CHATBOT_MODEL:openai/gpt-oss-120b}
chatbot.timeout-ms=${CHATBOT_TIMEOUT_MS:30000}
chatbot.max-tokens=${CHATBOT_MAX_TOKENS:4096}
chatbot.empty-response-retries=${CHATBOT_EMPTY_RESPONSE_RETRIES:1}
chatbot.catalog-max-characters=${CHATBOT_CATALOG_MAX_CHARACTERS:40000}

spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_STARTTLS:true}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_READ_TIMEOUT_MS:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT_MS:5000}
app.mail.max-send-attempts=${MAIL_MAX_SEND_ATTEMPTS:3}

app.public-base-url=${APP_PUBLIC_BASE_URL:}
app.bootstrap-admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap-admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.seed-demo-data=${SEED_DEMO_DATA:false}
app.password-reset.expiry-minutes=${PASSWORD_RESET_EXPIRY_MINUTES:30}
app.email-verification.expiry-minutes=${EMAIL_VERIFICATION_EXPIRY_MINUTES:10}
app.email-verification.max-attempts=${EMAIL_VERIFICATION_MAX_ATTEMPTS:8}
app.rate-limit.chat-per-minute=${CHAT_RATE_LIMIT_PER_MINUTE:20}
app.rate-limit.image-per-minute=${IMAGE_RATE_LIMIT_PER_MINUTE:5}
app.rate-limit.password-reset-per-15-minutes=${PASSWORD_RESET_RATE_LIMIT_PER_15_MINUTES:3}
app.rate-limit.registration-email-per-15-minutes=${REGISTRATION_EMAIL_RATE_LIMIT_PER_15_MINUTES:5}
app.rate-limit.verification-resend-per-15-minutes=${VERIFICATION_RESEND_RATE_LIMIT_PER_15_MINUTES:3}
app.rate-limit.verification-attempts-per-15-minutes=${VERIFICATION_ATTEMPTS_RATE_LIMIT_PER_15_MINUTES:20}


# Local tunnel auto-start. The dev profile enables ngrok by default; production disables it.
# Save the ngrok authtoken once with: ngrok config add-authtoken YOUR_TOKEN
ngrok.tunnel.executable=${NGROK_TUNNEL_EXECUTABLE:ngrok.exe}
ngrok.tunnel.local-url=${NGROK_TUNNEL_LOCAL_URL:}
ngrok.tunnel.public-url=${NGROK_PUBLIC_URL:}
ngrok.tunnel.inspect=${NGROK_INSPECT:false}
ngrok.tunnel.startup-timeout-seconds=${NGROK_TUNNEL_STARTUP_TIMEOUT_SECONDS:45}
cloudflare.tunnel.runtime-url-file=${CLOUDFLARE_TUNNEL_RUNTIME_URL_FILE:.runtime/cloudflare-public-url.txt}

# Forwarded client IPs are accepted only from explicitly trusted proxy CIDRs.
# Keep disabled unless the app actually runs behind a reverse proxy/tunnel.
app.trust-proxy-headers=${TRUST_PROXY_HEADERS:false}
app.trusted-proxy-cidrs=${TRUSTED_PROXY_CIDRS:127.0.0.1/32,::1/128}
