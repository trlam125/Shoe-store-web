<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Giỏ hàng - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="section"><h1>Giỏ hàng của bạn</h1>
    <p th:if="${#lists.isEmpty(items)}">Giỏ hàng đang trống.</p>
    <table th:if="${!#lists.isEmpty(items)}">
        <tr>
            <th>Sản phẩm</th>
            <th>Giá</th>
            <th>Số lượng</th>
            <th>Thao tác</th>
        </tr>
        <tr th:each="i:${items}">
            <td th:text="${i.product.name}"></td>
            <td th:text="${#numbers.formatDecimal(i.product.price,0,'COMMA',0,'POINT')} + 'đ'"></td>
            <td>
                <form th:action="@{/cart/update/{id}(id=${i.product.id})}" method="post"><input type="number"
                                                                                                name="quantity" min="0"
                                                                                                th:value="${i.quantity}">
                    <button>Cập nhật</button>
                </form>
            </td>
            <td>
                <form th:action="@{/cart/remove/{id}(id=${i.product.id})}" method="post">
                    <button>Xóa</button>
                </form>
            </td>
        </tr>
    </table>
    <h2 th:if="${!#lists.isEmpty(items)}">Tổng tiền: <span
            th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + 'đ'"></span></h2><a class="btn"
                                                                                                th:if="${!#lists.isEmpty(items)}"
                                                                                                th:href="@{/checkout}">Thanh
        toán</a></section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
