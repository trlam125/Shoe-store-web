<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt lại mật khẩu - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=2}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="form-box auth-card">
    <p class="badge badge-dark">Bảo mật tài khoản</p>
    <h1>Đặt lại mật khẩu</h1>
    <p class="error" th:if="${error}" th:text="${error}"></p>
    <form th:if="${tokenValid}" th:action="@{/reset-password}" method="post">
        <input type="hidden" name="token" th:value="${token}">
        <label>Mật khẩu mới</label>
        <input name="password" type="password" required minlength="8" maxlength="72" autocomplete="new-password">
        <label>Xác nhận mật khẩu</label>
        <input name="confirmPassword" type="password" required minlength="8" maxlength="72" autocomplete="new-password">
        <button class="btn" type="submit">Cập nhật mật khẩu</button>
    </form>
    <div class="empty-state compact" th:if="${!tokenValid}"><div class="empty-icon">🔒</div><h3>Liên kết không còn hiệu lực</h3><p>Liên kết đặt lại mật khẩu không hợp lệ, đã dùng hoặc đã hết hạn.</p><a class="btn" th:href="@{/forgot-password}">Yêu cầu liên kết mới</a></div>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
