<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quên mật khẩu - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="form-box">
    <h1>Quên mật khẩu</h1>
    <p>Nhập email tài khoản. LSHOE sẽ gửi liên kết đặt lại mật khẩu nếu email tồn tại.</p>
    <p class="ok" th:if="${success}" th:text="${success}"></p>
    <form th:action="@{/forgot-password}" method="post">
        <label>Email</label>
        <input name="email" type="email" required autocomplete="email">
        <button class="btn">Gửi liên kết đặt lại</button>
    </form>
    <p><a th:href="@{/login}">Quay lại đăng nhập</a></p>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
