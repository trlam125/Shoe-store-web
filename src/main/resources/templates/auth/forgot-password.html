<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quên mật khẩu - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=5}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="form-box auth-card">
    <p class="badge badge-dark">Khôi phục tài khoản</p>
    <h1>Quên mật khẩu</h1>
    <p class="form-intro">Nhập email tài khoản. Nếu email tồn tại, LSHOE sẽ gửi liên kết đặt lại mật khẩu có thời hạn.</p>
    <p class="ok" th:if="${success}" th:text="${success}"></p>
    <form th:action="@{/forgot-password}" method="post">
        <label>Email</label>
        <input name="email" type="email" required maxlength="190" autocomplete="email">
        <button class="btn" type="submit">Gửi liên kết đặt lại</button>
    </form>
    <p class="form-foot"><a th:href="@{/login}">← Quay lại đăng nhập</a></p>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
