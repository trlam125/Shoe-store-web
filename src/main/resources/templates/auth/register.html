<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="form-box"><h1>Tạo tài khoản LSHOE</h1>
    <p class="error" th:if="${error}" th:text="${error}"></p>
    <form th:action="@{/register}" method="post" th:object="${user}">
        <label>Họ và tên</label>
        <input th:field="*{fullName}" required>
        <p class="error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
        <label>Email</label>
        <input th:field="*{email}" type="email" required>
        <p class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        <label>Số điện thoại</label>
        <input th:field="*{phone}">
        <label>Địa chỉ</label>
        <textarea th:field="*{address}"></textarea>
        <label>Mật khẩu</label>
        <input th:field="*{password}" type="password" required>
        <p class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        <button class="btn">Đăng ký</button>
    </form>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
