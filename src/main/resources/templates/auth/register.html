<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=5}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="form-box">
    <p class="badge badge-dark">Thành viên mới</p>
    <h1>Tạo tài khoản LSHOE</h1>
    <p class="form-intro">Đăng ký để lưu giỏ hàng, theo dõi đơn và nhận trải nghiệm mua sắm thuận tiện hơn.</p>
    <p class="error" th:if="${error}" th:text="${error}"></p>
    <form th:action="@{/register}" method="post" th:object="${form}">
        <div class="form-grid">
            <div>
                <label>Họ và tên</label>
                <input th:field="*{fullName}" required maxlength="120" autocomplete="name">
                <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
            </div>
            <div>
                <label>Email</label>
                <input th:field="*{email}" type="email" required maxlength="190" autocomplete="email">
                <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
            </div>
            <div>
                <label>Số điện thoại</label>
                <input th:field="*{phone}" maxlength="20" autocomplete="tel" placeholder="Ví dụ: 0901234567">
                <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
            </div>
            <div>
                <label>Mật khẩu</label>
                <input th:field="*{password}" type="password" required minlength="8" maxlength="72" autocomplete="new-password">
                <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
            </div>
        </div>
        <label>Địa chỉ</label>
        <textarea th:field="*{address}" maxlength="500" autocomplete="street-address"></textarea>
        <p class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></p>

        <label>Xác minh bạn không phải robot</label>
        <div class="captcha-box">
            <strong th:text="${captchaQuestion}">2 + 3 = ?</strong>
            <input name="captchaAnswer" type="number" required autocomplete="off" inputmode="numeric" placeholder="Nhập kết quả">
        </div>
        <p class="field-error" th:if="${captchaError}" th:text="${captchaError}"></p>
        <button class="btn" type="submit">Tạo tài khoản</button>
    </form>
    <p class="form-foot">Đã có tài khoản? <a th:href="@{/login}">Đăng nhập</a></p>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
