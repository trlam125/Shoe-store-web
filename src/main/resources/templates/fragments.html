<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<body>
<header th:fragment="header" class="site-header">
    <div class="topbar">Miễn phí giao hàng cho đơn từ 1.000.000đ - Thanh toán khi nhận hàng</div>
    <nav class="navbar"><a class="logo" th:href="@{/}">LSHOE</a>
        <form th:action="@{/products}" class="search"><input name="q" placeholder="Tìm kiếm giày..." th:value="${q}">
            <button>Tìm</button>
        </form>
        <div class="navlinks"><a th:href="@{/products}">Sản phẩm</a><a th:href="@{/cart}">Giỏ hàng <span
                th:text="${cartCount != null ? cartCount : 0}">0</span></a><a sec:authorize="isAnonymous()"
                                                                              th:href="@{/login}">Đăng nhập</a><a
                sec:authorize="isAuthenticated()" th:href="@{/orders}">Đơn hàng</a><a sec:authorize="hasRole('ADMIN')"
                                                                                      th:href="@{/admin}">Admin</a>
            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="inline">
                <button>Đăng xuất</button>
            </form>
        </div>
    </nav>
</header>
<footer th:fragment="footer" class="footer">
    <div><b>LSHOE</b> - Website bán giày sneaker nam nữ.</div>
    <div>Địa chỉ: Hà Nội | Hotline: 0900 000 000 | Email: support@lshoe.vn</div>
</footer>
</body>
</html>
