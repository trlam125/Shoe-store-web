<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thanh toán - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="form-box"><h1>Thông tin giao hàng</h1>
    <form th:action="@{/checkout}" method="post"><label>Họ tên người nhận</label><input name="receiverName"
                                                                                        th:value="${user.fullName}"
                                                                                        required><label>Số điện
        thoại</label><input name="phone" th:value="${user.phone}" required><label>Địa chỉ nhận hàng</label><textarea
            name="address" required th:text="${user.address}"></textarea>
        <h3>Tổng tiền: <span th:text="${#numbers.formatDecimal(total,0,'COMMA',0,'POINT')} + 'đ'"></span></h3>
        <button class="btn">Đặt hàng COD</button>
    </form>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
