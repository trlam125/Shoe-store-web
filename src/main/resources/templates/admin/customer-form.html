<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chỉnh sửa tài khoản - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=7}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="form-box form-box-wide">
    <div class="title-row">
        <div>
            <p class="eyebrow">Quản lý khách hàng</p>
            <h1>Chỉnh sửa thông tin tài khoản</h1>
            <p class="form-intro">Email, vai trò và mật khẩu không được thay đổi tại đây để bảo đảm an toàn tài khoản.</p>
        </div>
        <a class="btn secondary small" th:href="@{/admin/customers/{id}(id=${customer.user.id})}">Quay lại chi tiết</a>
    </div>

    <div class="account-readonly-grid">
        <div><span>Email</span><b th:text="${customer.user.email}"></b></div>
        <div><span>Vai trò</span><b th:text="${customer.user.role == 'ROLE_ADMIN' ? 'Quản trị viên' : 'Khách hàng'}"></b></div>
        <div><span>Trạng thái</span><b th:text="${customer.user.enabled ? 'Đang hoạt động' : 'Đã khóa'}"></b></div>
    </div>

    <form th:action="@{/admin/customers/{id}/edit(id=${customer.user.id})}" th:object="${customerForm}" method="post">
        <label>Họ và tên</label>
        <input type="text" th:field="*{fullName}" maxlength="120" required>
        <p class="field-error" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>

        <div class="form-grid">
            <div>
                <label>Số điện thoại</label>
                <input type="text" th:field="*{phone}" maxlength="20" autocomplete="tel">
                <p class="field-error" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></p>
            </div>
        </div>

        <label>Địa chỉ</label>
        <textarea th:field="*{address}" maxlength="500"></textarea>
        <p class="field-error" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></p>

        <div class="form-actions">
            <button class="btn" type="submit">Lưu thay đổi</button>
            <a class="btn secondary" th:href="@{/admin/customers/{id}(id=${customer.user.id})}">Hủy</a>
        </div>
    </form>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
