<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Quản lý đơn hàng - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="section">
    <h1>Quản lý đơn hàng</h1>
    <p class="error" th:if="${error}" th:text="${error}" style="color:#c0392b;background:#fde;padding:10px;border-radius:6px;margin-bottom:12px;"></p>
    <table>
        <tr>
            <th>Mã</th>
            <th>Khách hàng</th>
            <th>SĐT</th>
            <th>Địa chỉ</th>
            <th>Tổng tiền</th>
            <th>Ngày đặt</th>
            <th>Hoàn thành lúc</th>
            <th>Trạng thái</th>
        </tr>
        <tr th:each="o:${orders}">
            <td th:text="${o.id}"></td>
            <td th:text="${o.receiverName}"></td>
            <td th:text="${o.phone}"></td>
            <td th:text="${o.address}"></td>
            <td th:text="${#numbers.formatDecimal(o.total,0,'COMMA',0,'POINT')} + 'đ'"></td>
            <td th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${o.completedAt != null ? #temporals.format(o.completedAt,'dd/MM/yyyy HH:mm') : '-'}"></td>
            <td>
                <form th:action="@{/admin/orders/{id}/status(id=${o.id})}" method="post">
                    <select name="status">
                        <option th:each="s:${statuses}"
                                th:value="${s}"
                                th:selected="${s == o.status}"
                                th:text="${s.displayName}"></option>
                    </select>
                    <button>Cập nhật</button>
                </form>
            </td>
        </tr>
    </table>

    <!-- Pagination -->
    <div class="pagination" th:if="${totalPages > 1}">
        <a th:if="${currentPage > 0}"
           th:href="@{/admin/orders(page=${currentPage - 1})}">&laquo; Trước</a>
        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <a th:href="@{/admin/orders(page=${i})}"
               th:text="${i + 1}"
               th:classappend="${i == currentPage} ? 'active' : ''"></a>
        </span>
        <a th:if="${currentPage < totalPages - 1}"
           th:href="@{/admin/orders(page=${currentPage + 1})}">Tiếp &raquo;</a>
    </div>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
