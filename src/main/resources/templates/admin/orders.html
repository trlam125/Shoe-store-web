<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý đơn hàng - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css?v=5}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="section">
    <div class="title-row"><div><p class="eyebrow">Vận hành đơn hàng</p><h1>Quản lý đơn hàng</h1></div><a class="btn secondary small" th:href="@{/admin}">Về bảng điều khiển</a></div>
    <div class="table-wrap"><table>
        <thead><tr><th>Mã</th><th>Khách hàng</th><th>Sản phẩm</th><th>Liên hệ</th><th>Địa chỉ</th><th>Tổng tiền</th><th>Thời gian</th><th>Trạng thái</th></tr></thead>
        <tbody><tr th:each="o : ${orders}">
            <td><b th:text="${'#' + o.id}"></b></td>
            <td th:text="${o.receiverName}"></td>
            <td><div class="order-items-compact" th:each="item : ${o.items}"><b th:text="${item.productName}"></b><span th:if="${item.productBrand != null and !item.productBrand.isBlank()}" th:text="${item.productBrand}"></span><span th:text="${'Size ' + item.selectedSize + ' · SL ' + item.quantity}"></span></div></td>
            <td th:text="${o.phone}"></td>
            <td class="address-cell" th:text="${o.address}"></td>
            <td><b th:text="${#numbers.formatDecimal(o.total,0,'COMMA',0,'POINT')} + 'đ'"></b></td>
            <td><span th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}"></span><small th:if="${o.completedAt != null}" th:text="${'Hoàn thành: ' + #temporals.format(o.completedAt,'dd/MM/yyyy HH:mm')}"></small></td>
            <td><form class="status-form" th:action="@{/admin/orders/{id}/status(id=${o.id})}" method="post"><select name="status" th:disabled="${o.status.terminal}"><option th:each="s : ${statuses}" th:if="${s == o.status || o.status.canTransitionTo(s)}" th:value="${s}" th:selected="${s == o.status}" th:text="${s.displayName}"></option></select><button class="table-button" th:if="${!o.status.terminal}" type="submit">Cập nhật</button><span class="status-pill" th:if="${o.status.terminal}" th:classappend="${o.status.name().toLowerCase()}" th:text="${o.status.displayName}"></span></form></td>
        </tr></tbody>
    </table></div>
    <div class="empty-state" th:if="${#lists.isEmpty(orders)}"><div class="empty-icon">📦</div><h3>Chưa có đơn hàng</h3><p>Đơn hàng mới sẽ xuất hiện tại đây.</p></div>
    <div class="pagination" th:if="${totalPages > 1}"><a th:if="${currentPage > 0}" th:href="@{/admin/orders(page=${currentPage - 1})}">« Trước</a><span th:each="i : ${#numbers.sequence(0, totalPages - 1)}"><a th:href="@{/admin/orders(page=${i})}" th:text="${i + 1}" th:classappend="${i == currentPage} ? 'active' : ''"></a></span><a th:if="${currentPage < totalPages - 1}" th:href="@{/admin/orders(page=${currentPage + 1})}">Tiếp »</a></div>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
