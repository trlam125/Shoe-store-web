<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Sản phẩm - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="section"><h1>Tất cả giày</h1>
    <div class="chips"><a th:href="@{/products}">Tất cả</a><a th:each="c:${categories}"
                                                              th:href="@{/products(category=${c.id})}"
                                                              th:text="${c.name}"></a></div>
    <div class="grid">
        <div class="card" th:each="p:${products}"><img th:src="${p.imageUrl}" alt="Giày">
            <div class="card-body"><p class="brand" th:text="${p.brand}"></p>
                <h3 th:text="${p.name}"></h3>
                <p class="desc" th:text="${p.description}"></p><span class="price"
                                                                     th:text="${#numbers.formatDecimal(p.price,0,'COMMA',0,'POINT')} + 'đ'"></span><a
                        class="btn small" th:href="@{/products/{id}(id=${p.id})}">Xem chi tiết</a></div>
        </div>
    </div>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
