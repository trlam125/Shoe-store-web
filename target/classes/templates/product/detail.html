<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${product.name}">Chi tiết</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<main class="detail"><img th:src="${product.imageUrl}" alt="Giày">
    <div><p class="brand" th:text="${product.brand}"></p>
        <h1 th:text="${product.name}"></h1>
        <p th:text="${product.description}"></p>
        <p>Kích cỡ: <b th:text="${product.sizeText}"></b></p>
        <p>Tồn kho: <b th:text="${product.stock}"></b></p>
        <div><span class="price big"
                   th:text="${#numbers.formatDecimal(product.price,0,'COMMA',0,'POINT')} + 'đ'"></span><span class="old"
                                                                                                             th:text="${#numbers.formatDecimal(product.oldPrice,0,'COMMA',0,'POINT')} + 'đ'"></span>
        </div>
        <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post">
            <button class="btn">Thêm vào giỏ hàng</button>
        </form>
    </div>
</main>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
