<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đơn hàng - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="section">
    <h1>Lịch sử đơn hàng</h1>
    <p class="error" th:if="${error}" th:text="${error}" style="color:#c0392b;background:#fde;padding:10px;border-radius:6px;"></p>
    <p th:if="${#lists.isEmpty(orders)}">Bạn chưa có đơn hàng nào.</p>
    <table th:if="${!#lists.isEmpty(orders)}">
        <tr>
            <th>Mã đơn</th>
            <th>Ngày đặt</th>
            <th>Hoàn thành lúc</th>
            <th>Tổng tiền</th>
            <th>Trạng thái</th>
        </tr>
        <tr th:each="o:${orders}">
            <td th:text="${o.id}"></td>
            <td th:text="${#temporals.format(o.createdAt,'dd/MM/yyyy HH:mm')}"></td>
            <td th:text="${o.completedAt != null ? #temporals.format(o.completedAt,'dd/MM/yyyy HH:mm') : '-'}"></td>
            <td th:text="${#numbers.formatDecimal(o.total,0,'COMMA',0,'POINT')} + 'đ'"></td>
            <td th:text="${o.status.displayName}"></td>
        </tr>
    </table>
</section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
