<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - LSHOE</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="~{fragments :: header}"></div>
<section class="form-box"><h1>Đăng nhập</h1>
    <p th:if="${param.registered}" class="ok">Đăng ký thành công, vui lòng đăng nhập.</p>
    <p th:if="${param.error}" class="error">Email hoặc mật khẩu không đúng.</p>
    <form th:action="@{/login}" method="post"><label>Email</label><input name="email" type="email" required><label>Mật
        khẩu</label><input name="password" type="password" required>
        <button class="btn">Đăng nhập</button>
    </form>
    <p>Chưa có tài khoản? <a th:href="@{/register}">Đăng ký ngay</a></p></section>
<div th:replace="~{fragments :: footer}"></div>
</body>
</html>
